services:
  - type: web
    name: academic-intervention-api
    env: python
    region: oregon
    plan: starter
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python prestart.py && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: academic-db
          property: connectionString
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false
      - key: FIREBASE_WEB_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MAX_TOKENS
        value: "600"
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: ONESIGNAL_APP_ID
        sync: false
      - key: ONESIGNAL_API_KEY
        sync: false
      - key: APP_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: academic-db
    databaseName: academic
    user: academic_user
    plan: starter
